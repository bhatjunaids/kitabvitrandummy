
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitab Vitran — Multi-Level Delivery Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#04080d;color:#dee5ed;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#0a1018}::-webkit-scrollbar-thumb{background:#1e3048;border-radius:2px}

.hdr{background:#0a1220;border-bottom:1px solid #1a2a3e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#2e80fa,#7c5cfc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.hdr h1{font-size:16px;font-weight:700}.hdr h1 small{font-weight:400;font-size:11px;color:#7b8c9f;display:block;margin-top:2px}

.tbar{padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid #1a2a3e;background:#0b1119}
.bc{display:flex;align-items:center;gap:4px;font-size:13px}
.bc span{color:#7b8c9f;cursor:pointer;padding:3px 8px;border-radius:5px}
.bc span:hover{background:#132030;color:#dee5ed}
.bc span.on{color:#2e80fa;font-weight:700}
.flt{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sel{background:#132030;color:#dee5ed;border:1px solid #1f3050;padding:6px 10px;border-radius:6px;font-size:12px;font-family:inherit}
.sel:focus{outline:none;border-color:#2e80fa}

/* Receiver toggle */
.rtog{display:flex;border:1px solid #1f3050;border-radius:6px;overflow:hidden}
.rtog button{background:#132030;color:#7b8c9f;border:none;padding:6px 14px;font:600 11px system-ui;cursor:pointer;transition:.15s;border-right:1px solid #1f3050}
.rtog button:last-child{border-right:none}
.rtog button.on{background:#2e80fa;color:#fff}
.rtog button:hover:not(.on){background:#1a2840;color:#dee5ed}

/* Summary */
.sum{padding:12px 24px;display:flex;gap:10px;overflow-x:auto}
.sc{background:#132030;border:1px solid #1a2a3e;border-radius:8px;padding:10px 16px;min-width:110px;flex-shrink:0}
.sc .l{font-size:9px;color:#3d4e60;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:600}
.sc .v{font-weight:700;font-size:18px;font-family:monospace}

/* Gap banner */
.gap-bar{padding:8px 24px;display:flex;gap:10px;overflow-x:auto}
.gap-card{background:#1a1028;border:1px solid #2d1f4e;border-radius:8px;padding:8px 14px;min-width:130px;flex-shrink:0}
.gap-card .l{font-size:9px;color:#8b6fc0;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px;font-weight:600}
.gap-card .v{font-weight:700;font-size:16px;font-family:monospace;color:#c084fc}
.gap-card.warn{border-color:#78350f;background:#1c1608}
.gap-card.warn .l{color:#d97706}
.gap-card.warn .v{color:#fbbf24}

/* Info + legend */
.info{padding:6px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.info .title{font-size:10px;color:#3d4e60;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.leg{display:flex;align-items:center;gap:3px;font-size:9px;color:#3d4e60}
.leg div{width:18px;height:8px;border-radius:2px}
.mode-label{font-size:11px;color:#7b8c9f;padding:2px 24px 0}

/* Table */
.tw{padding:4px 24px 40px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:2px}
th{background:#0b1119;color:#7b8c9f;padding:8px 4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;z-index:10}
th:first-child{text-align:left;min-width:140px;padding-left:10px}
td{padding:6px 4px;text-align:center;font-size:10px;font-weight:600;font-family:monospace;border-radius:3px}
td:first-child{text-align:left;font-family:system-ui;font-size:12px;font-weight:600;color:#dee5ed;background:#132030!important;padding-left:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
tr.ck{cursor:pointer}
tr.ck:hover td{filter:brightness(1.3)}
tr.ck td:first-child:hover{color:#2e80fa}
td.av{background:#132030!important;font-weight:700;border-left:2px solid #2e80fa}
td .s{display:block;font-size:7px;opacity:.5;margin-top:1px;font-weight:400}
td .gap{display:block;font-size:7px;color:#fbbf24;margin-top:1px}

.c0{background:#171b2e;color:#525e75}
.c1{background:#5b1a1a;color:#fca5a5}
.c2{background:#6e3409;color:#fdba74}
.c3{background:#6b3f0a;color:#fde68a}
.c4{background:#2f5010;color:#bef264}
.c5{background:#0f5132;color:#86efac}
.cf{background:#044535;color:#6ee7b7}
</style>
</head>

var DLIST=Object.keys(DBC).sort();
var rcv="BSA",lvl="district",sD=null,sB=null,sT="ALL";

function init(){
  var i,o,s=document.getElementById("fT");
  for(i=0;i<T.length;i++){o=document.createElement("option");o.value=T[i];o.textContent=T[i];s.appendChild(o)}
  s=document.getElementById("fD");
  for(i=0;i<DLIST.length;i++){o=document.createElement("option");o.value=DLIST[i];o.textContent=DLIST[i];s.appendChild(o)}
  document.getElementById("fT").onchange=function(){sT=this.value;render()};
  document.getElementById("fD").onchange=function(){if(this.value)goD(this.value);else nav("district")};
  document.getElementById("fB").onchange=function(){if(this.value)goB(this.value);else nav("block")};
  mkBC();render();
}

function setReceiver(r){
  rcv=r;
  // Reset navigation based on receiver
  if(r==="BSA"){lvl="district";sD=null;sB=null;document.getElementById("fD").value="";document.getElementById("fB").style.display="none"}
  else if(r==="BEO"){
    if(!sD){lvl="district";sB=null}// show district first, then drill to blocks
    else{lvl="block";sB=null}
  }
  else if(r==="HM"){
    if(!sD||!sB){if(!sD)lvl="district";else lvl="block"}
    else lvl="school";
  }
  var btns=document.querySelectorAll("#rtog button");
  btns.forEach(function(b){b.classList.remove("on")});
  btns.forEach(function(b){if(b.textContent.indexOf(r)===0)b.classList.add("on")});
  mkBC();render();
}

function mkBC(){
  var h="<span class='"+(lvl==="district"?"on":"")+"' onclick=\"nav('district')\">All Districts</span>";
  if(sD)h+=" <span style='color:#3d4e60;font-size:10px'>›</span> <span class='"+(lvl==="block"?"on":"")+"' onclick=\"nav('block')\">"+sD+"</span>";
  if(sB)h+=" <span style='color:#3d4e60;font-size:10px'>›</span> <span class='on'>"+sB+"</span>";
  document.getElementById("bc").innerHTML=h;
}

function hc(p){if(p<=0)return"c0";if(p<20)return"c1";if(p<40)return"c2";if(p<60)return"c3";if(p<80)return"c4";if(p<100)return"c5";return"cf"}
function esc(s){return s.replace(/'/g,"\\'")}
function gi(){return sT==="ALL"?T.map(function(_,i){return i}):[T.indexOf(sT)]}
function gn(){return sT==="ALL"?T:[sT]}

// Compute totals for gap analysis
function distTarget(d){return Object.values(DBC[d]).reduce(function(a,b){return a+b},0)}
function distBSA(d,ti){return(BSA[d]&&BSA[d][ti])||0}
function distBEOsum(d,ti){
  var sum=0;for(var b in DBC[d]){var k=d+"~"+b;sum+=(BEO[k]&&BEO[k][ti])||0}return sum;
}
function distHMsum(d,ti){
  var sum=0;for(var b in DBC[d]){var schools=UL[d+"~"+b]||[];
    schools.forEach(function(u){if(HM[u]&&HM[u].charAt(ti)==="1")sum++})}return sum;
}
function blockBEO(d,b,ti){var k=d+"~"+b;return(BEO[k]&&BEO[k][ti])||0}
function blockHMsum(d,b,ti){
  var schools=UL[d+"~"+b]||[];var sum=0;
  schools.forEach(function(u){if(HM[u]&&HM[u].charAt(ti)==="1")sum++});return sum;
}

function render(){
  var idx=gi(),tns=gn();
  var hd=document.getElementById("hH"),bd=document.getElementById("hB");
  var vl=document.getElementById("vlb"),ml=document.getElementById("modeLabel");

  // Mode description
  var modeDesc = {
    BSA: "Showing what BSA reported received at district warehouse — % against total schools (target)",
    BEO: "Showing what BEOs reported received at block offices — with gap vs BSA dispatch",
    HM: "Showing what HMs confirmed received at schools — with gap vs BEO dispatch"
  };
  ml.textContent = modeDesc[rcv];

  // Determine what to show
  if(rcv==="BSA"){
    renderBSA(idx,tns);
  } else if(rcv==="BEO"){
    if(!sD) renderBEOdistrictOverview(idx,tns);
    else renderBEOblocks(idx,tns);
  } else {
    if(!sD) renderHMdistrictOverview(idx,tns);
    else if(!sB) renderHMblockOverview(idx,tns);
    else renderHMschools(idx,tns);
  }
}

// ===== BSA VIEW: District-level, what BSA received vs target =====
function renderBSA(idx,tns){
  var hd=document.getElementById("hH"),bd=document.getElementById("hB"),vl=document.getElementById("vlb");
  vl.textContent="BSA REPORTED — "+DLIST.length+" Districts (received at district warehouse)";

  var hh="<tr><th>District</th>";
  tns.forEach(function(t){hh+="<th>"+t+"</th>"});
  hh+="<th>Avg</th></tr>";hd.innerHTML=hh;

  var rows="",st={t:0,hi:0,lo:0,zr:0};
  var totalGapSent=0,totalGapRcvd=0;

  DLIST.forEach(function(d){
    var target=distTarget(d);
    var ps=[];
    rows+="<tr class='ck' onclick=\"setReceiver('BEO');goD('"+esc(d)+"')\">";
    rows+="<td>"+d+"</td>";
    idx.forEach(function(ti){
      var rcvd=distBSA(d,ti);
      var p=target?Math.min(100,Math.round(rcvd/target*100)):0;
      ps.push(p);
      rows+="<td class='"+hc(p)+"'>"+p+"%<span class='s'>"+rcvd+"/"+target+"</span></td>";
    });
    var avg=Math.round(ps.reduce(function(a,b){return a+b},0)/ps.length);
    rows+="<td class='av "+hc(avg)+"'>"+avg+"%</td></tr>";
    st.t++;if(avg>=80)st.hi++;if(avg<40)st.lo++;if(avg===0)st.zr++;
  });
  bd.innerHTML=rows;
  renderSummary(st,"Districts");
  // Gap: BSA total vs BEO total (all districts)
  var gapHtml="";
  if(sT!=="ALL"){
    var ti=T.indexOf(sT);
    var bsaTotal=0,beoTotal=0,hmTotal=0;
    DLIST.forEach(function(d){bsaTotal+=distBSA(d,ti);beoTotal+=distBEOsum(d,ti);hmTotal+=distHMsum(d,ti)});
    gapHtml+=gapCard("BSA Received",bsaTotal,"#2e80fa");
    gapHtml+=gapCard("BEO Received",beoTotal,"#c084fc");
    gapHtml+=gapCardWarn("BSA→BEO Gap",bsaTotal-beoTotal,bsaTotal>0?Math.round((bsaTotal-beoTotal)/bsaTotal*100)+"%":"");
    gapHtml+=gapCard("HM Confirmed",hmTotal,"#34d399");
    gapHtml+=gapCardWarn("BEO→HM Gap",beoTotal-hmTotal,beoTotal>0?Math.round((beoTotal-hmTotal)/beoTotal*100)+"%":"");
  }
  document.getElementById("gapBar").innerHTML=gapHtml;
}

// ===== BEO VIEW: District overview (sum of all blocks per district) =====
function renderBEOdistrictOverview(idx,tns){
  var hd=document.getElementById("hH"),bd=document.getElementById("hB"),vl=document.getElementById("vlb");
  vl.textContent="BEO REPORTED — District Overview (sum of blocks vs BSA dispatch)";

  var hh="<tr><th>District</th>";
  tns.forEach(function(t){hh+="<th>"+t+"</th>"});
  hh+="<th>Avg</th></tr>";hd.innerHTML=hh;

  var rows="",st={t:0,hi:0,lo:0,zr:0};

  DLIST.forEach(function(d){
    var ps=[];
    rows+="<tr class='ck' onclick=\"goD('"+esc(d)+"')\">";
    rows+="<td>"+d+"</td>";
    idx.forEach(function(ti){
      var bsaSent=distBSA(d,ti);
      var beoRcvd=distBEOsum(d,ti);
      var p=bsaSent?Math.min(100,Math.round(beoRcvd/bsaSent*100)):0;
      ps.push(p);
      var gap=bsaSent-beoRcvd;
      rows+="<td class='"+hc(p)+"'>"+p+"%<span class='s'>"+beoRcvd+"/"+bsaSent+" sent</span>"+(gap>0?"<span class='gap'>↓"+gap+" gap</span>":"")+"</td>";
    });
    var avg=Math.round(ps.reduce(function(a,b){return a+b},0)/ps.length);
    rows+="<td class='av "+hc(avg)+"'>"+avg+"%</td></tr>";
    st.t++;if(avg>=80)st.hi++;if(avg<40)st.lo++;if(avg===0)st.zr++;
  });
  bd.innerHTML=rows;
  renderSummary(st,"Districts");
  document.getElementById("gapBar").innerHTML="";
}

function renderBEOblocks(idx,tns){
  var hd=document.getElementById("hH"),bd=document.getElementById("hB"),vl=document.getElementById("vlb");
  var blist=Object.keys(DBC[sD]||{}).sort();
  vl.textContent="BEO REPORTED — "+sD+" ("+blist.length+" blocks vs BSA dispatch)";

  var hh="<tr><th>Block</th>";
  tns.forEach(function(t){hh+="<th>"+t+"</th>"});
  hh+="<th>Avg</th></tr>";hd.innerHTML=hh;

  var rows="",st={t:0,hi:0,lo:0,zr:0};

  blist.forEach(function(b){
    var ns=DBC[sD][b];
    var ps=[];
    rows+="<tr class='ck' onclick=\"setReceiver('HM');goB('"+esc(b)+"')\">";
    rows+="<td>"+b+"</td>";
    idx.forEach(function(ti){
      // BEO received vs block's proportional share of BSA
      var beoRcvd=blockBEO(sD,b,ti);
      var p=ns?Math.min(100,Math.round(beoRcvd/ns*100)):0;
      ps.push(p);
      rows+="<td class='"+hc(p)+"'>"+p+"%<span class='s'>"+beoRcvd+"/"+ns+" target</span></td>";
    });
    var avg=Math.round(ps.reduce(function(a,b){return a+b},0)/ps.length);
    rows+="<td class='av "+hc(avg)+"'>"+avg+"%</td></tr>";
    st.t++;if(avg>=80)st.hi++;if(avg<40)st.lo++;if(avg===0)st.zr++;
  });
  bd.innerHTML=rows;
  renderSummary(st,"Blocks");

  // Gap bar for this district
  var gapHtml="";
  idx.forEach(function(ti){
    var bsaSent=distBSA(sD,ti);
    var beoRcvd=distBEOsum(sD,ti);
    var gap=bsaSent-beoRcvd;
    if(idx.length<=3) gapHtml+=gapCardWarn(T[ti]+" gap",gap, bsaSent>0?Math.round(gap/bsaSent*100)+"%":"");
  });
  if(idx.length>3){
    var bsaT=0,beoT=0;
    idx.forEach(function(ti){bsaT+=distBSA(sD,ti);beoT+=distBEOsum(sD,ti)});
    gapHtml=gapCard("BSA Sent",bsaT,"#2e80fa")+gapCard("BEO Received",beoT,"#c084fc")+gapCardWarn("Total Gap",bsaT-beoT,bsaT>0?Math.round((bsaT-beoT)/bsaT*100)+"%":"");
  }
  document.getElementById("gapBar").innerHTML=gapHtml;
}

  var hd=document.getElementById("hH"),bd=document.getElementById("hB"),vl=document.getElementById("vlb");
  vl.textContent="HM CONFIRMED — District Overview (schools confirmed vs BEO dispatch)";

  var hh="<tr><th>District</th>";
  tns.forEach(function(t){hh+="<th>"+t+"</th>"});
  hh+="<th>Avg</th></tr>";hd.innerHTML=hh;

  DLIST.forEach(function(d){
    var ps=[];
    rows+="<tr class='ck' onclick=\"goD('"+esc(d)+"')\">";
    rows+="<td>"+d+"</td>";
    idx.forEach(function(ti){
      var beoSent=distBEOsum(d,ti);

    });
    var avg=Math.round(ps.reduce(function(a,b){return a+b},0)/ps.length);
    rows+="<td class='av "+hc(avg)+"'>"+avg+"%</td></tr>";

  });

  renderSummary(st,"Districts");

}

// ===== HM VIEW: Block overview within district =====
function renderHMblockOverview(idx,tns){
  var hd=document.getElementById("hH"),bd=document.getElementById("hB"),vl=document.getElementById("vlb");
  var blist=Object.keys(DBC[sD]||{}).sort();
  vl.textContent="HM CONFIRMED — "+sD+" ("+blist.length+" blocks, schools confirmed vs BEO)";

  var hh="<tr><th>Block</th>";
  tns.forEach(function(t){hh+="<th>"+t+"</th>"});
  hh+="<th>Avg</th></tr>";hd.innerHTML=hh;

  var rows="",st={t:0,hi:0,lo:0,zr:0};

  blist.forEach(function(b){
    var ps=[];
    rows+="<tr class='ck' onclick=\"goB('"+esc(b)+"')\">";
    rows+="<td>"+b+"</td>";
    idx.forEach(function(ti){
      var beoSent=blockBEO(sD,b,ti);
      var hmRcvd=blockHMsum(sD,b,ti);
      var denom=Math.max(beoSent,DBC[sD][b]);
      var p=denom?Math.min(100,Math.round(hmRcvd/denom*100)):0;
      ps.push(p);
      var gap=beoSent-hmRcvd;
      rows+="<td class='"+hc(p)+"'>"+p+"%<span class='s'>"+hmRcvd+"/"+beoSent+" sent</span>"+(gap>0?"<span class='gap'>↓"+gap+"</span>":"")+"</td>";
    });
    var avg=Math.round(ps.reduce(function(a,b){return a+b},0)/ps.length);
    rows+="<td class='av "+hc(avg)+"'>"+avg+"%</td></tr>";
    st.t++;if(avg>=80)st.hi++;if(avg<40)st.lo++;if(avg===0)st.zr++;
  });
  bd.innerHTML=rows;
  renderSummary(st,"Blocks");

  // Gap for this district: BEO→HM
  var gapHtml="";
  var beoT=0,hmT=0;
  idx.forEach(function(ti){beoT+=distBEOsum(sD,ti);hmT+=distHMsum(sD,ti)});
  gapHtml=gapCard("BEO Dispatched",beoT,"#c084fc")+gapCard("HM Confirmed",hmT,"#34d399")+gapCardWarn("BEO→HM Gap",beoT-hmT,beoT>0?Math.round((beoT-hmT)/beoT*100)+"%":"");
  document.getElementById("gapBar").innerHTML=gapHtml;
}

// ===== HM VIEW: Individual schools =====
function renderHMschools(idx,tns){
  var hd=document.getElementById("hH"),bd=document.getElementById("hB"),vl=document.getElementById("vlb");
  var schools=UL[sD+"~"+sB]||[];
  vl.textContent="HM CONFIRMED — "+sD+" / "+sB+" ("+schools.length+" schools)";

  var hh="<tr><th>UDISE Code</th>";
  tns.forEach(function(t){hh+="<th>"+t+"</th>"});
  hh+="<th>Avg</th></tr>";hd.innerHTML=hh;

  var rows="",st={t:0,hi:0,lo:0,zr:0};

  schools.forEach(function(u){
    var sc=HM[u]||"";
    var ps=[];
    rows+="<tr><td>"+u+"</td>";
    idx.forEach(function(ti){
      var v=sc.charAt(ti)==="1"?1:0;
      ps.push(v?100:0);
      if(v) rows+="<td style='background:#044535;color:#6ee7b7;font-size:14px'>✓</td>";
      else rows+="<td style='background:#171b2e;color:#525e75;font-size:13px'>✗</td>";
    });
    var avg=ps.length?Math.round(ps.reduce(function(a,b){return a+b},0)/ps.length):0;
    rows+="<td class='av "+hc(avg)+"'>"+avg+"%</td></tr>";
    st.t++;if(avg>=80)st.hi++;if(avg<40)st.lo++;if(avg===0)st.zr++;
  });
  bd.innerHTML=rows;
  renderSummary(st,"Schools");

  // Gap for this block
  var gapHtml="";
  idx.forEach(function(ti){
    var beoSent=blockBEO(sD,sB,ti);
    var hmRcvd=blockHMsum(sD,sB,ti);
    if(idx.length<=3) gapHtml+=gapCardWarn(T[ti],beoSent-hmRcvd,"sent:"+beoSent+" got:"+hmRcvd);
  });
  if(idx.length>3){
    var beoT=0,hmT=0;
    idx.forEach(function(ti){beoT+=blockBEO(sD,sB,ti);hmT+=blockHMsum(sD,sB,ti)});
    gapHtml=gapCard("BEO Sent",beoT,"#c084fc")+gapCard("HM Got",hmT,"#34d399")+gapCardWarn("Gap",beoT-hmT,"");
  }
  document.getElementById("gapBar").innerHTML=gapHtml;
}

function gapCard(label,val,color){
  return "<div class='gap-card'><div class='l'>"+label+"</div><div class='v' style='color:"+color+"'>"+val.toLocaleString()+"</div></div>";
}
function gapCardWarn(label,val,sub){
  return "<div class='gap-card warn'><div class='l'>"+label+"</div><div class='v'>"+val.toLocaleString()+(sub?" <span style='font-size:10px;opacity:.7'>"+sub+"</span>":"")+"</div></div>";
}

function renderSummary(st,ln){
  document.getElementById("sum").innerHTML=
    "<div class='sc'><div class='l'>Total "+ln+"</div><div class='v' style='color:#2e80fa'>"+st.t.toLocaleString()+"</div></div>"+
    "<div class='sc'><div class='l'>≥80%</div><div class='v' style='color:#34d399'>"+st.hi.toLocaleString()+"</div></div>"+
    "<div class='sc'><div class='l'>&lt;40%</div><div class='v' style='color:#fbbf24'>"+st.lo.toLocaleString()+"</div></div>"+
    "<div class='sc'><div class='l'>No Data</div><div class='v' style='color:#f87171'>"+st.zr.toLocaleString()+"</div></div>";
}

function goD(d){
  sD=d;sB=null;
  if(rcv==="BSA") rcv="BEO"; // auto-switch to BEO when drilling from BSA
  lvl="block";
  document.getElementById("fD").value=d;
  var s=document.getElementById("fB"),blist=Object.keys(DBC[d]||{}).sort();
  s.innerHTML="<option value=''>All Blocks</option>";
  for(var i=0;i<blist.length;i++){var o=document.createElement("option");o.value=blist[i];o.textContent=blist[i];s.appendChild(o)}
  s.style.display="";
  // Update toggle
  var btns=document.querySelectorAll("#rtog button");
  btns.forEach(function(b){b.classList.remove("on")});
  btns.forEach(function(b){if(b.textContent.indexOf(rcv)===0)b.classList.add("on")});
  mkBC();render();
}
function goB(b){
  sB=b;lvl="school";
  if(rcv==="BEO") rcv="HM";
  document.getElementById("fB").value=b;
  var btns=document.querySelectorAll("#rtog button");
  btns.forEach(function(btn){btn.classList.remove("on")});
  btns.forEach(function(btn){if(btn.textContent.indexOf(rcv)===0)btn.classList.add("on")});
  mkBC();render();
}
function nav(l){
  if(l==="district"){sD=null;sB=null;lvl="district";document.getElementById("fD").value="";document.getElementById("fB").style.display="none"}
  else if(l==="block"){sB=null;lvl="block";document.getElementById("fB").value=""}
  mkBC();render();
}
init();
</script>
